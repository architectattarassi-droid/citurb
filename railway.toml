[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./node_modules/.bin/prisma generate --schema prisma/schema.prisma && ./node_modules/.bin/prisma migrate deploy --schema prisma/schema.prisma && node apps/api/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
